name: Render UML

on:
  push:
    paths:
      - '**.puml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install PlantUML
        run: sudo apt-get update && sudo apt-get install -y plantuml graphviz

      - name: Render diagrams
        run: |
          mkdir -p exports/png exports/svg
          plantuml -tpng -o exports/png diagrams
          plantuml -tsvg -o exports/svg diagrams

      - name: Debug file output
        run: |
          echo "Listing exports directory:"
          ls -R exports || echo "No exports folder"

      - name: Upload generated diagrams
        uses: actions/upload-artifact@v4
        with:
          name: diagram-artifacts
          path: exports/